version: "3.9"

services:
  web:
    build: ..
    ports:
      - "5000:8000"
    env_file:
      - ../.env
    volumes:
      - ../logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/admin/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: wifi_billing
      POSTGRES_USER: wifi_user
      POSTGRES_PASSWORD: change_me
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wifi_user -d wifi_billing"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
